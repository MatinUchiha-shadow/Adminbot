<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ادمین اوچیها | پل ارتباطی کانال‌های تلگرام</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

  <div id="auth-overlay">
    <div class="login-card">
      <h1>ادمین اوچیها</h1>
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">ورود</button>
        <button class="tab-btn" data-tab="register">ثبت‌نام</button>
      </div>

      <form id="login-form" class="auth-form">
        <input type="email" id="login-email" placeholder="ایمیل" required>
        <input type="password" id="login-password" placeholder="رمز عبور" required>
        <button type="submit">ورود</button>
      </form>

      <form id="register-form" class="auth-form" style="display:none;">
        <input type="email" id="register-email" placeholder="ایمیل" required>
        <input type="password" id="register-password" placeholder="رمز عبور (حداقل ۶ کاراکتر)" required>
        <button type="submit">ثبت‌نام</button>
      </form>

      <div class="login-error" id="auth-error"></div>
    </div>
  </div>

  <div class="wrap" id="app" style="display:none;">
    <header class="top">
      <div class="brand"><span class="dot"></span> ادمین اوچیها</div>
      <div class="tagline">پل ارتباطی زنده بین کانال‌های تلگرام، با ویرایش هوشمند متن</div>
      <div class="user-bar">
        <span id="user-email"></span>
        <span class="plan-badge" id="plan-badge"></span>
        <span id="plan-expiry" class="plan-expiry"></span>
        <button class="icon-btn" id="logout-btn">خروج</button>
      </div>
    </header>

    <div class="upsell-bar" id="upsell-banner" style="display:none;">
      <span>پلن رایگان: فقط ۱ پل و فقط متن.</span>
      <a id="upgrade-link" target="_blank">ارتقا به اشتراک پلاس (۱۰۰هزار تومان / ۳۰ روز) ←</a>
    </div>

    <nav class="tabs main-tabs" id="main-tabs">
      <button class="tab-btn active" data-view="bridges">پل‌های ارتباطی</button>
      <button class="tab-btn" data-view="admin" id="admin-tab-btn" style="display:none;">پنل ادمین</button>
    </nav>

    <section id="view-bridges">
      <section class="panel">
        <h2>ساخت پل ارتباطی جدید</h2>
        <form id="bridge-form">
          <div class="grid-2">
            <div class="field">
              <label>کانال مبدا (عمومی، بدون @)</label>
              <input type="text" id="f-source" placeholder="channel_username" required>
            </div>
            <div class="field">
              <label>کانال مقصد (@یوزرنیم یا آیدی عددی)</label>
              <input type="text" id="f-target" placeholder="@my_channel" required>
            </div>
          </div>
          <div class="field">
            <label>توکن ربات (باید تو کانال مقصد ادمین باشه)</label>
            <input type="text" class="mono" id="f-token" placeholder="از BotFather بگیر" required>
          </div>
          <div class="field" id="filter-field">
            <label>چه محتوایی فوروارد بشه؟</label>
            <select id="f-filter">
              <option value="all">همه‌ی محتوا (متن، عکس، ویدیو)</option>
              <option value="text">فقط متن‌ها</option>
              <option value="photo">متن و عکس</option>
              <option value="video">متن و ویدیو</option>
            </select>
          </div>
          <button type="submit" class="btn btn-signal">ایجاد پل ارتباطی</button>
          <div class="form-error" id="form-error"></div>
        </form>
      </section>

      <section class="panel">
        <h2>پل‌های فعال</h2>
        <div id="bridges"><div class="empty-state">هنوز پلی نساختی.</div></div>
      </section>
    </section>

    <section id="view-admin" style="display:none;">
      <section class="panel">
        <h2>کاربرهای ثبت‌نام‌شده</h2>
        <div id="users-table"><div class="empty-state">در حال بارگذاری...</div></div>
      </section>
    </section>
  </div>

  <div id="log-toggle" style="display:none;">
    <div class="bar" id="log-bar">
      <span>رویدادهای زنده</span>
      <span id="log-caret">▲</span>
    </div>
    <div id="log-body" class="mono"></div>
  </div>

  <script src="/app.js"></script>
</body>
  </html>
